<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up</title>

</head>
<body>

    <aside class="left-part">

        <img src="background-image.jpg" alt="Nature background image">

        <div>
            <img src="odin-logo.png" alt="Odin Logo">
            <p>T.O.P.</p>
        </div>

        <p>Photo by Halie West on Unsplash</p>

    </aside>

    <main class="right-part">

        <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now </em> to get started.</p>

        <p>You <em>know</em> you want to.</p>

        <div>

            <h1>Let's do this!</h1>

            <form action="https://httpbin.org/post" method="post">

                <div>
                    <label for="first-name">First Name</label>
                    <input type="text" name="firstName" id="first-name" placeholder="Thor" required>
                </div>

                <div>
                    <label for="last-name">Last Name</label>
                    <input type="text" name="lastName" id="last-name" placeholder="Odinson" required>
                </div>

                <div>
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="thor@asgard.com" required>
                </div>

                <div>
                    <label for="phone">Phone Number</label>
                    <input type="tel" name="phoneNumber" id="phone" placeholder="123-456-7890" required>
                </div>

                <div>
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required>
                </div>

                <div>
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" name="confirmPassword" id="confirm-password" required>
                </div>

                <button>Create Account</button>

            </form>

            <p>Already have an account? <a href="#">Log in</a></p>

        </div>

    </main>

    <!--svg si alea de verificare-->

</body>
</html>
